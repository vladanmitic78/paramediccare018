name: Deploy to Hetzner

on:
  # Auto-deploy on push to main
  push:
    branches:
      - main
  
  # Manual deploy button (Actions tab → Run workflow)
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm'
        required: false
        default: 'deploy'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 46.225.75.191
          username: deploy
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            cd /opt/paramedic-care
            
            # Pull latest code
            git fetch origin
            git reset --hard origin/main
            
            # Remove emergentintegrations (not available on production)
            sed -i '/emergentintegrations/d' backend/requirements.txt
            
            # Rebuild containers
            sudo docker-compose down
            sudo docker-compose up -d --build
            
            # Update main nginx config for compression
            sudo tee /etc/nginx/sites-available/paramedic-care018 > /dev/null << 'NGINXCONF'
            server {
                listen 80;
                server_name paramedic-care018.rs www.paramedic-care018.rs;
                return 301 https://$server_name$request_uri;
            }

            server {
                listen 443 ssl;
                server_name paramedic-care018.rs www.paramedic-care018.rs;

                ssl_certificate /etc/letsencrypt/live/paramedic-care018.rs/fullchain.pem;
                ssl_certificate_key /etc/letsencrypt/live/paramedic-care018.rs/privkey.pem;

                gzip on;
                gzip_vary on;
                gzip_min_length 256;
                gzip_proxied any;
                gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml image/svg+xml;
                gzip_comp_level 6;

                location / {
                    proxy_pass http://localhost:3000;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection 'upgrade';
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                    proxy_cache_bypass $http_upgrade;
                }

                location /api {
                    proxy_pass http://localhost:8001;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection 'upgrade';
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                    proxy_read_timeout 300s;
                }

                location /ws {
                    proxy_pass http://localhost:8001;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection "upgrade";
                    proxy_set_header Host $host;
                    proxy_read_timeout 86400;
                }
            }
            NGINXCONF
            
            # Reload nginx
            sudo nginx -t && sudo systemctl reload nginx
            
            echo "Deployment completed at $(date)"
