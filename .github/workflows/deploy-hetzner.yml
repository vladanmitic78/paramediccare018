name: Deploy to Hetzner VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  SERVER_IP: 178.104.38.153
  SERVER_USER: root
  APP_DIR: /var/www/paramedic-care018

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: frontend
        run: |
          npm install -g yarn
          yarn install --network-timeout 100000

      - name: Build frontend
        working-directory: frontend
        env:
          REACT_APP_BACKEND_URL: https://paramedic-care018.rs
          CI: false
        run: yarn build

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ env.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Deploy backend
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            --exclude '__pycache__' \
            --exclude '*.pyc' \
            --exclude '.env' \
            --exclude 'uploads' \
            --exclude 'venv' \
            backend/ ${{ env.SERVER_USER }}@${{ env.SERVER_IP }}:${{ env.APP_DIR }}/backend/

      - name: Deploy frontend build
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            frontend/build/ ${{ env.SERVER_USER }}@${{ env.SERVER_IP }}:${{ env.APP_DIR }}/frontend/build/

      - name: Install dependencies and restart backend
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ env.SERVER_USER }}@${{ env.SERVER_IP }} 'bash -s' << 'ENDSSH'
            cd /var/www/paramedic-care018/backend
            
            # Activate virtual environment
            source venv/bin/activate
            
            # Install dependencies quietly
            pip install -r requirements.txt -q
            
            # Restart backend with PM2
            pm2 restart paramedic-backend || pm2 start ./start_backend.sh --name paramedic-backend
            pm2 save
            
            echo "Backend restarted!"
          ENDSSH

      - name: Health check
        run: |
          sleep 5
          curl -sf https://paramedic-care018.rs/api/health && echo " - OK" || echo "Health check pending"
