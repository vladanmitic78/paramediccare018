version: '3.8'

services:
  mongodb:
    image: mongo:7
    restart: always
    volumes:
      - mongodb_data:/data/db
    networks:
      - app-network

  backend:
    build: ./backend
    restart: always
    ports:
      - "8001:8001"
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=paramedic_care_018
      - JWT_SECRET=ParamedicCare018SecureKey2026xK9mP2vL8nQ4wR7
    depends_on:
      - mongodb
    volumes:
      # Persist uploaded files
      - uploads_data:/app/uploads
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      args:
        - REACT_APP_BACKEND_URL=https://paramedic-care018.rs
    restart: always
    ports:
      - "3000:3000"
    networks:
      - app-network

volumes:
  # These volumes persist data across deployments
  mongodb_data:
    name: paramedic_mongodb_data
  uploads_data:
    name: paramedic_uploads_data

networks:
  app-network:
    driver: bridge
